kind = "web"
previewPath = "/"
title = "Navjivan Hospital"
version = "1.0.0"
id = "artifacts/navjivan-hospital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24159

[services.development]
run = "pnpm --filter @workspace/navjivan-hospital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/navjivan-hospital", "run", "build" ]
publicDir = "artifacts/navjivan-hospital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24159"
BASE_PATH = "/"
